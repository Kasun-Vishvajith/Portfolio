<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Case Study | Kasun Vishvajith</title>
    <link rel="icon" type="image/png" href="assets/images/face_favicon.png">
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2463eb',
                        secondary: '#3b82f6',
                        accent: '#f59e0b',
                        emerald: '#10b981',
                        orange: '#f97316',
                        violet: '#8b5cf6',
                        rose: '#f43f5e',
                        darkBg: '#050505',
                        darkCard: 'rgba(255, 255, 255, 0.02)',
                        darkBorder: 'rgba(255, 255, 255, 0.05)',
                        textMuted: '#94a3b8'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-darkBg text-textMuted flex flex-col min-h-screen font-sans selection:bg-primary selection:text-white">

    <nav class="fixed top-0 w-full z-50 px-6 py-8">
        <div
            class="max-w-6xl mx-auto flex items-center justify-between glass-card rounded-full px-10 py-4 border border-white/10">
            <a href="index.html#projects"
                class="inline-flex items-center text-[#94a3b8] hover:text-white transition-all text-sm font-semibold group/back">
                <span
                    class="material-symbols-outlined mr-2 text-xl group-hover:-translate-x-1 transition-transform">arrow_back</span>
                Back to Projects
            </a>
            <div class="flex items-center gap-3">
                <div class="h-1.5 w-1.5 rounded-full bg-violet animate-pulse"></div>
                <span class="font-black tracking-tight text-xl text-white">Case Study.</span>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main class="flex-grow py-16 px-6" id="project-main">
        <div class="max-w-4xl mx-auto text-center py-32" id="project-loading">
            <svg class="animate-spin h-10 w-10 text-darkBorder mx-auto mb-4" xmlns="http://www.w3.org/2000/svg"
                fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
            </svg>
            <p class="text-textMuted tracking-widest uppercase text-sm font-bold">Loading case study details...</p>
        </div>
        <!-- Content injected by JS -->
    </main>

    <!-- Image Modal -->
    <div id="image-modal"
        class="modal-overlay fixed inset-0 z-50 bg-darkBg/95 flex items-center justify-center p-4 backdrop-blur-sm"
        role="dialog" aria-modal="true">
        <div class="relative max-w-6xl w-full modal-content flex flex-col items-center">
            <button id="close-modal"
                class="absolute -top-12 right-0 text-textMuted hover:text-white transition-colors p-2 z-50"
                aria-label="Close modal">
                <svg class="w-8 h-8 focus:outline-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </button>
            <img id="modal-image" src="" alt="Zoomed view"
                class="rounded-lg shadow-2xl max-h-[85vh] object-contain w-auto border border-darkBorder">
        </div>
    </div>

    <footer class="mt-40 border-t border-white/5 pt-20 pb-10 fade-in-section">
        <div
            class="max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between align-center items-center text-slate-600 text-xs font-medium uppercase tracking-widest gap-8">
            <p>© <span id="current-year">2026</span> Kasun Vishvajith Portfolio</p>
            <div class="flex gap-8 items-center">
                <a class="hover:text-white transition-all flex items-center gap-1.5 group"
                    href="https://www.linkedin.com/in/kasun-vishvajith-625746242">
                    <svg class="w-3.5 h-3.5 fill-current opacity-70 group-hover:opacity-100" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" />
                    </svg>
                    LinkedIn
                </a>
                <a class="hover:text-white transition-all flex items-center gap-1.5 group"
                    href="https://github.com/Kasun-Vishvajith">
                    <svg class="w-3.5 h-3.5 fill-current opacity-70 group-hover:opacity-100" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.042-1.416-4.042-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z" />
                    </svg>
                    GitHub
                </a>
                <a href="mailto:kasunvishvajithofficial@gmail.com"
                    class="hover:text-white transition-all flex items-center gap-1.5 group active:scale-95">
                    <span
                        class="material-symbols-outlined text-lg opacity-70 group-hover:opacity-100 transition-all">mail</span>
                    EMAIL
                </a>
            </div>
        </div>
    </footer>

    <!-- Multi-Color Gradient Background Elements for Depth -->
    <div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-20">
        <div class="absolute top-[-10%] right-[-10%] w-[600px] h-[600px] bg-primary/20 rounded-full blur-[120px]"></div>
        <div class="absolute top-[20%] left-[-10%] w-[500px] h-[500px] bg-violet/15 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] left-[20%] w-[600px] h-[600px] bg-emerald/10 rounded-full blur-[120px]">
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
</body>

</html>
